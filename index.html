<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agribot Notification Dashboard</title>
    
    <!-- iPhone PWA-விற்கான முக்கிய கோப்புகள் -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agribot">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { color: #2e7d32; font-size: 24px; margin-bottom: 5px; }
        .status { color: #757575; font-size: 14px; margin-bottom: 25px; }
        .card {
            background: #edf7ed;
            border-left: 5px solid #4caf50;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: left;
        }
        .card.alert {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
        }
        .card-title { font-weight: bold; color: #1e4620; }
        .card-desc { font-size: 14px; margin-top: 5px; color: #4e4e4e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚜 Agribot Dashboard</h1>
        <div class="status">Live Notification System</div>

        <div class="card">
            <div class="card-title">🌱 System Status</div>
            <div class="card-desc">Agribot is online and monitoring the field.</div>
        </div>

        <div class="card alert">
            <div class="card-title">⚠️ Moisture Alert</div>
            <div class="card-desc">Zone B soil moisture is low. Irrigation recommended.</div>
        </div>
    </div>

</body>
</html>
